services:
  redis-sidekiq:
    image: redis:8-alpine
    container_name: redis-sidekiq
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-sidekiq-data:/data
    command: >
      redis-server
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
volumes:
  redis-sidekiq-data:
