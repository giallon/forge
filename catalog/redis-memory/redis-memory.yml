service:
  redis-memory:
    image: redis:8-alpine
    container_name: redis-memory
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly no
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
